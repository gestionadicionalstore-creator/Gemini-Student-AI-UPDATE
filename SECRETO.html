<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflexión Especial</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Arial, sans-serif;
    }
    
    body {
        background: #09090b;
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
    }

    /* LIENZO PARA LA SIMULACIÓN DE PARTÍCULAS */
    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }

    /* CONTENEDOR DE LA INTERFAZ */
    .interface-container {
        position: relative;
        z-index: 2;
        max-width: 550px;
        width: 90%;
        background: rgba(20, 20, 25, 0.75);
        border: 1px solid rgba(255, 0, 68, 0.2);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 30px;
        padding: 50px 40px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 0, 68, 0.1);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 35px;
        animation: containerEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* CONTENEDOR DEL CORAZÓN CSS/SVG AVANZADO */
    .heart-glow-wrapper {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .heart-svg {
        width: 100%;
        height: 100%;
        fill: #ff0547;
        filter: drop-shadow(0 0 12px #ff0547) drop-shadow(0 0 30px rgba(255, 5, 71, 0.6));
        animation: pulseBeat 1.2s infinite cubic-bezier(0.215, 0.610, 0.355, 1) alternate;
    }

    /* TEXTO MOTIVACIONAL CON EFECTO DE APARICIÓN */
    .message-box {
        min-height: 70px; /* Evita que el contenedor salte mientras se escribe */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .message-text {
        font-size: 24px;
        font-weight: 600;
        line-height: 1.5;
        letter-spacing: 0.5px;
        color: #ffffff;
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }

    .highlight {
        color: #ff0547;
        font-weight: 700;
        text-shadow: 0 0 15px rgba(255, 5, 71, 0.5);
    }

    /* Cursor parpadeante de escritura */
    .cursor {
        display: inline-block;
        width: 3px;
        height: 24px;
        background: #ff0547;
        margin-left: 5px;
        animation: blink 0.8s infinite;
        vertical-align: middle;
    }

    /* BOTÓN TECNOLÓGICO */
    .action-btn {
        background: #111115;
        color: #efefef;
        border: 1px solid #2a2a35;
        padding: 14px 32px;
        border-radius: 14px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1px;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .action-btn:hover {
        background: #ff0547;
        color: white;
        border-color: #ff0547;
        box-shadow: 0 0 25px rgba(255, 5, 71, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
        transform: translateY(-3px);
    }

    .action-btn:active {
        transform: translateY(-1px);
    }

    /* DEFINICIÓN DE ANIMACIONES */
    @keyframes pulseBeat {
        0% { transform: scale(0.92); filter: drop-shadow(0 0 8px #ff0547) drop-shadow(0 0 20px rgba(255, 5, 71, 0.4)); }
        100% { transform: scale(1.06); filter: drop-shadow(0 0 18px #ff0547) drop-shadow(0 0 45px rgba(255, 5, 71, 0.8)); }
    }

    @keyframes containerEntrance {
        from { opacity: 0; transform: scale(0.95) translateY(15px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes blink {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
    }
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="interface-container">
    
    <div class="heart-glow-wrapper">
        <svg class="heart-svg" viewBox="0 0 32 29.6">
            <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
            c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
        </svg>
    </div>

    <div class="message-box">
        <div class="message-text" id="typedMessage"></div><span class="cursor" id="typeCursor"></span>
    </div>

    <button class="action-btn" onclick="window.close();" > <a href="./Mensajes .html" style="color: #efefef; font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">CERRAR</a></button>

</div>

<script>
    // --- SIMULACIÓN DE PARTÍCULAS NEÓN (CANVAS) ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    const particleCount = 65;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.radius = Math.random() * 2.5 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.6;
            this.speedY = (Math.random() - 0.5) * 0.6;
            // Tonos rojos y carmesí neón aleatorios
            this.color = Math.random() > 0.3 ? 'rgba(255, 5, 71, ' + (Math.random() * 0.4 + 0.1) + ')' : 'rgba(255, 255, 255, ' + (Math.random() * 0.2) + ')';
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                this.reset();
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }

    function initParticles() {
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dibujar y conectar partículas sutilmente
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
        }
        requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();


    // --- EFECTO MÁQUINA DE ESCRIBIR (TYPING EFFECT) ---
    const textTarget = document.getElementById('typedMessage');
    const cursor = document.getElementById('typeCursor');
    
    // Texto estructurado dividiendo el HTML para activar el color cian/rojo dinámico
    const messageFragments = [
        "Recuerda que eres ",
        "<span class='highlight'>muy especial</span>",
        ", confía en ti."
    ];

    let fragmentIndex = 0;
    let charIndex = 0;
    let currentHTML = "";

    function typeWriter() {
        if (fragmentIndex < messageFragments.length) {
            const currentFragment = messageFragments[fragmentIndex];
            
            // Si es una etiqueta HTML completa (el fragmento destacado), lo inyectamos de golpe para no romper el DOM
            if (currentFragment.startsWith("<span")) {
                currentHTML += currentFragment;
                textTarget.innerHTML = currentHTML;
                fragmentIndex++;
                setTimeout(typeWriter, 150);
            } else {
                // Si es texto plano, va carácter por carácter
                currentHTML += currentFragment.charAt(charIndex);
                textTarget.innerHTML = currentHTML;
                charIndex++;
                
                if (charIndex < currentFragment.length) {
                    setTimeout(typeWriter, 45);
                } else {
                    charIndex = 0;
                    fragmentIndex++;
                    setTimeout(typeWriter, 150);
                }
            }
        } else {
            // Ocultar cursor sutilmente al terminar la escritura limpia
            cursor.style.display = 'inline-block';
        }
    }

    // Retrasar ligeramente el inicio de la escritura para esperar la transición de la tarjeta
    setTimeout(typeWriter, 500);
</script>
</body>
</html>
