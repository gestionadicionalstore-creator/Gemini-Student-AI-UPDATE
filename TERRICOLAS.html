<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Juro Que Te Amo - Gatitos Románticos</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Roboto, sans-serif;
    }

    body {
        background: #020105;
        color: white;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    /* FONDO ESPACIAL, ESTRELLAS Y ESTRELLAS FUGACES */
    .space-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: radial-gradient(circle at center, #140933 0%, #020105 100%);
        z-index: 1;
    }
    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: blink 2s infinite ease-in-out;
    }
    @keyframes blink {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
    }

    /* Estrellas Fugaces */
    .shooting-star {
        position: absolute;
        top: 0;
        left: 50%;
        width: 4px;
        height: 4px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
        animation: shoot 3s linear infinite;
        opacity: 0;
    }
    .shooting-star::before {
        content: '';
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 120px;
        height: 2px;
        background: linear-gradient(90deg, #fff, transparent);
    }
    @keyframes shoot {
        0% { transform: rotate(-35deg) translateX(0); opacity: 0; }
        10% { opacity: 1; }
        30% { transform: rotate(-35deg) translateX(-400px); opacity: 0; }
        100% { transform: rotate(-35deg) translateX(-400px); opacity: 0; }
    }

    /* CORAZONES ANIMADOS CON CSS (ESTILO VECTORIAL / PREMIUM) */
    .css-heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, #ff1a40 0%, #b3001e 100%);
        transform: rotate(45deg);
        z-index: 2;
        pointer-events: none;
        box-shadow: -2px 2px 10px rgba(255, 26, 64, 0.5);
        animation: floatUpCSSHeart 3.5s ease-out forwards;
    }
    .css-heart::before,
    .css-heart::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: inherit;
        border-radius: 50%;
    }
    .css-heart::before {
        top: -10px;
        left: 0;
    }
    .css-heart::after {
        left: -10px;
        top: 0;
    }

    @keyframes floatUpCSSHeart {
        0% { transform: translateY(0) rotate(45deg) scale(0.3); opacity: 0; }
        15% { opacity: 0.9; transform: translateY(-20px) rotate(40deg) scale(1); }
        85% { opacity: 0.7; }
        100% { transform: translateY(-320px) rotate(55deg) scale(1.3); opacity: 0; }
    }

    /* PANTALLA DE INICIO */
    #intro-screen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #020105;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.8s ease-out;
    }
    .start-btn {
        background: #ff1a40;
        color: white;
        padding: 18px 40px;
        font-size: 22px;
        font-weight: bold;
        border: none;
        border-radius: 35px;
        cursor: pointer;
        box-shadow: 0 0 25px #ff1a40;
    }

    /* CONTENEDOR PRINCIPAL */
    #main-container {
        position: relative;
        z-index: 3;
        width: 90%;
        max-width: 650px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px;
    }

    /* CAJA DE LETRAS */
    .lyrics-box {
        background: rgba(8, 4, 18, 0.85);
        border: 2px solid #ff1a40;
        box-shadow: 0 0 20px rgba(255, 26, 64, 0.4);
        padding: 22px;
        border-radius: 18px;
        backdrop-filter: blur(10px);
        min-height: 95px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .lyrics-text {
        font-size: 25px;
        font-weight: 800;
        color: #ff1a40;
        text-shadow: 0 0 12px rgba(255, 26, 64, 0.9);
        line-height: 1.4;
    }

    /* ESCENA */
    .stage-area {
        width: 100%;
        height: 350px;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: flex-end;
    }

    .big-moon {
        width: 140px;
        height: 140px;
        background: radial-gradient(circle at 30% 30%, #ffffff 0%, #fff6d6 40%, #ffd97d 100%);
        border-radius: 50%;
        position: absolute;
        top: 10px;
        box-shadow: 0 0 60px rgba(255, 217, 125, 0.6);
    }

    .fence {
        width: 100%;
        height: 25px;
        background: linear-gradient(180deg, #161324 0%, #06050d 100%);
        position: absolute;
        bottom: 0;
        z-index: 5;
    }

    /* PAREJA DE GATOS */
    .cats-couple {
        display: flex;
        gap: 160px; 
        z-index: 6;
        margin-bottom: 20px;
        position: relative;
        transition: gap 3.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* DISEÑO DE GATOS */
    .cat {
        width: 90px;
        height: 110px;
        position: relative;
        transition: transform 0.3s ease;
    }

    .cat-body {
        width: 76px;
        height: 85px;
        background: #1e1d24;
        border-radius: 40px 40px 30px 30px;
        position: absolute;
        bottom: 0;
        left: 7px;
        box-shadow: inset -4px -4px 0px #131217;
    }

    .cat-legs {
        position: absolute;
        bottom: 0;
        width: 100%;
        display: flex;
        justify-content: space-around;
        padding: 0 10px;
    }
    .leg {
        width: 18px;
        height: 35px;
        background: #1e1d24;
        border-radius: 10px 10px 8px 8px;
        border-left: 1.5px solid #131217;
    }

    .cat-head {
        width: 106px;
        height: 88px;
        background: #1e1d24;
        border-radius: 55px 55px 50px 50px;
        position: absolute;
        top: -45px;
        left: -8px;
        box-shadow: inset -3px -3px 0px #131217, 0 5px 8px rgba(0,0,0,0.4);
        z-index: 2;
    }

    .cat-head::before, .cat-head::after {
        content: ""; position: absolute; width: 0; height: 0;
        border-top: 8px solid transparent; border-bottom: 8px solid transparent; bottom: 30px;
    }
    .cat-head::before { border-right: 12px solid #1e1d24; left: -8px; transform: rotate(-15deg); }
    .cat-head::after { border-left: 12px solid #1e1d24; right: -8px; transform: rotate(15deg); }

    .ear {
        width: 34px;
        height: 44px;
        background: #1e1d24;
        position: absolute;
        top: -16px;
        border: 2px solid #2d2b36;
        z-index: 1;
    }
    .ear-l { left: 4px; border-radius: 25px 0 0 0; transform: rotate(-18deg); }
    .ear-r { right: 4px; border-radius: 0 25px 0 0; transform: rotate(18deg); }

    .face-container {
        position: absolute;
        width: 100%; height: 100%; top: 0; left: 0;
    }
    .eyes {
        display: flex; justify-content: space-between; width: 82px;
        position: absolute; top: 32px; left: 12px;
    }
    .eye {
        width: 34px; height: 34px; background: #ffffff; border-radius: 50%;
        position: relative; display: flex; justify-content: center; align-items: center;
        overflow: hidden; transition: all 0.2s ease;
    }
    .pupil {
        width: 14px; height: 26px; background: #111; border-radius: 50%;
        position: absolute; bottom: 4px; transition: all 0.2s ease;
    }
    .cat-left .pupil { right: 4px; }
    .cat-right .pupil { left: 4px; }

    .nose {
        width: 6px; height: 4px; background: #ff9ebb; border-radius: 50%;
        position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
    }
    .mouth {
        width: 16px; height: 8px; position: absolute; top: 60px; left: 50%;
        transform: translateX(-50%); transition: all 0.2s ease;
    }
    .mouth::before, .mouth::after {
        content: ""; position: absolute; width: 8px; height: 6px;
        border: 2px solid #111; border-top: none; border-radius: 0 0 5px 5px; top: 0;
    }
    .mouth::before { left: 0; } .mouth::after { right: 0; }

    .tongue {
        width: 10px; height: 0px; background: #ff527b; border-radius: 0 0 5px 5px;
        position: absolute; top: 64px; left: 50%; transform: translateX(-50%);
        transition: height 0.15s ease; z-index: 3;
    }

    .blush {
        position: absolute; width: 14px; height: 8px;
        background: rgba(255, 26, 64, 0.65); border-radius: 50%;
        filter: blur(2px); top: 54px; opacity: 0; transition: opacity 0.3s ease;
    }
    .blush-l { left: 10px; } .blush-r { right: 10px; }

    .whiskers-l, .whiskers-r {
        position: absolute; width: 15px; height: 10px; top: 54px;
        border-bottom: 1.5px solid #131217;
    }
    .whiskers-l { left: -3px; transform: rotate(-5deg); }
    .whiskers-r { right: -3px; transform: rotate(5deg); }

    /* DETALLE DE LA FLOR OCULTA */
    .gift-flower {
        position: absolute;
        font-size: 22px;
        bottom: 25px;
        right: -15px;
        transform: scale(0) rotate(-30deg);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 4;
    }
    .cat-left.reveal-flower .gift-flower {
        transform: scale(1) rotate(15deg);
        animation: sway 1s infinite alternate ease-in-out;
    }
    @keyframes sway {
        0% { transform: scale(1) rotate(10deg); }
        100% { transform: scale(1) rotate(22deg); }
    }

    /* BOTÓN REGRESAR QUE REDIRIGE A ./mensajes.html */
    #return-btn {
        position: absolute;
        bottom: 40px;
        background: #ff1a40;
        color: white;
        padding: 12px 30px;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 0 15px rgba(255, 26, 64, 0.4);
        z-index: 9;
        transform: scale(0);
        transition: transform 0.5s ease-out;
    }
    #return-btn.show-btn {
        transform: scale(1);
    }

    /* --- EXPRESIONES DINÁMICAS --- */
    .cat.funny-tongue .tongue { height: 10px; animation: waggle 0.1s infinite alternate; }
    .cat-left.funny-tongue .eye:first-child, .cat-right.funny-tongue .eye:last-child {
        height: 4px; margin-top: 15px; background: #111; border-radius: 0;
    }
    @keyframes waggle { 0% { transform: translateX(-50%) rotate(-4deg); } 100% { transform: translateX(-50%) rotate(4deg); } }

    .cat.laughing .eye { background: transparent; height: 14px; }
    .cat.laughing .eye::before {
        content: ""; position: absolute; width: 32px; height: 20px;
        border: 4px solid #ffffff; border-bottom: none; border-radius: 30px 30px 0 0; top: 4px;
    }
    .cat.laughing .pupil { display: none; }
    .cat.laughing .mouth {
        width: 18px; height: 10px; background: #ff9ebb;
        border-radius: 0 0 12px 12px; border: 2px solid #111; top: 60px;
    }
    .cat.laughing .mouth::before, .cat.laughing .mouth::after { display: none; }
    .cat.laughing { animation: bounceGiggle 0.1s infinite alternate; }
    @keyframes bounceGiggle { 0% { transform: translateY(0); } 100% { transform: translateY(-4px); } }

    .cat.in-love .blush { opacity: 1; }
    .cat-left.in-love .pupil { right: 0px; }
    .cat-right.in-love .pupil { left: 0px; }

    .cat.surprised .blush { opacity: 1; }
    .cat.surprised .pupil { width: 22px; height: 22px; bottom: 6px; left: 6px; border-radius: 50%; }
    .cat.surprised .mouth { width: 10px; height: 10px; border: 2px solid #111; border-radius: 50%; }
    .cat.surprised .mouth::before, .cat.surprised .mouth::after { display: none; }

    .dance-pulse { animation: generalBounce 0.55s infinite alternate ease-in-out; }
    @keyframes generalBounce { 0% { transform: scale(1); } 100% { transform: scale(1.01) translateY(-1px); } }

</style>
</head>
<body>

<div class="space-bg" id="spaceBg">
    <div class="shooting-star" style="top: 10%; left: 80%; animation-delay: 0s;"></div>
    <div class="shooting-star" style="top: 25%; left: 95%; animation-delay: 4s;"></div>
    <div class="shooting-star" style="top: 5%; left: 60%; animation-delay: 7s;"></div>
</div>

<div id="intro-screen">
    <button class="start-btn" onclick="startShow()">VER TRANSMISIÓN</button>
</div>

<div id="main-container">
    
    <div class="stage-area" id="stageArea">
        <div class="big-moon"></div>
        
        <div class="cats-couple" id="catsCouple">
            <div class="cat cat-left" id="catL">
                <div class="ear ear-l"></div><div class="ear ear-r"></div>
                <div class="cat-body">
                    <div class="cat-legs"><div class="leg"></div><div class="leg"></div></div>
                </div>
                <div class="gift-flower" id="rose">🌹</div>
                <div class="cat-head">
                    <div class="face-container">
                        <div class="whiskers-l"></div><div class="whiskers-r"></div>
                        <div class="blush blush-l"></div><div class="blush blush-r"></div>
                        <div class="eyes">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="nose"></div>
                        <div class="mouth"></div>
                        <div class="tongue"></div>
                    </div>
                </div>
            </div>

            <div class="cat cat-right" id="catR">
                <div class="ear ear-l"></div><div class="ear ear-r"></div>
                <div class="cat-body">
                    <div class="cat-legs"><div class="leg"></div><div class="leg"></div></div>
                </div>
                <div class="cat-head">
                    <div class="face-container">
                        <div class="whiskers-l"></div><div class="whiskers-r"></div>
                        <div class="blush blush-l"></div><div class="blush blush-r"></div>
                        <div class="eyes">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="nose"></div>
                        <div class="mouth"></div>
                        <div class="tongue"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="fence"></div>
    </div>

    <div class="lyrics-box">
        <div class="lyrics-text" id="lyricsText">...</div>
    </div>

    <a href="./Mensajes .html" id="return-btn">REGRESAR</a>

</div>

<audio id="loveSong" src="./Te Juro Que Te Amo.mp3"></audio>

<script>
    const audio = document.getElementById('loveSong');
    const introScreen = document.getElementById('intro-screen');
    const lyricsText = document.getElementById('lyricsText');
    const spaceBg = document.getElementById('spaceBg');
    const catsCouple = document.getElementById('catsCouple');
    const catL = document.getElementById('catL');
    const catR = document.getElementById('catR');
    const stageArea = document.getElementById('stageArea');
    const returnBtn = document.getElementById('return-btn');

    // Inicializar 85 estrellas fijas en el fondo
    for (let i = 0; i < 85; i++) {
        let star = document.createElement('div');
        star.className = 'star';
        star.style.width = star.style.height = (Math.random() * 2.5 + 1) + 'px';
        star.style.top = Math.random() * 60 + '%';
        star.style.left = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        spaceBg.appendChild(star);
    }

    let dynamicHeartsInterval;
    let finalHeartsInterval;

    // Generador de ráfagas intensas de corazones CSS desde diferentes partes
    function spawnCSSHeart(fromCenter = false) {
        let heart = document.createElement('div');
        heart.className = 'css-heart';
        
        if (fromCenter) {
            // Brotan del centro de los gatitos
            heart.style.left = '50%';
            heart.style.bottom = '100px';
        } else {
            // Brotan desde diferentes partes aleatorias de la pantalla
            heart.style.left = (Math.random() * 90 + 5) + '%';
            heart.style.top = (Math.random() * 40 + 30) + '%';
        }
        
        // Tamaños variados aleatorios para mayor dinamismo
        let size = Math.random() * 12 + 12;
        heart.style.width = size + 'px';
        heart.style.height = size + 'px';
        
        stageArea.appendChild(heart);
        setTimeout(() => heart.remove(), 3500);
    }

    // TUS MENSAJES Y TIEMPOS ORIGINALES RESTAURADOS AL 100%
    const timeline = [
        { time: 0, text: "🎵 (Mirando juntos las estrellas...) 🎵", action: "normal" },
        { time: 16, text: "Te juro que te amo...", action: "L-funny" }, 
        { time: 22, text: "Afuera está lloviendo,", action: "R-funny" }, 
        { time: 25, text: "por dentro estoy temblando...", action: "L-funny" },
        { time: 29, text: "Y quisiera cantartela completa", action: "normal" },
        { time: 31, text: "Pero quiero que sepas", action: "R-funny" },
        { time: 33, text: "Que eres una mujer muy especial", action: "L-funny" },
        { time: 36, text: "Que amo estar contigo", action: "normal" },
        { time: 40, text: "Que quiero estar contigo", action: "pre-love" }, 
        { time: 43, text: "Y si te juro que te amo...", action: "give-flower" }, // Instante sorpresa de la rosa
        { time: 46, text: "¡Y que siempre estaremos juntitos!", action: "together-laugh" }, // Juntos y riendo
        { time: 49, text: "❤️ Porque eres el amor de mi vida ❤️", action: "end" }
    ];

    function startShow() {
        introScreen.style.opacity = 0;
        setTimeout(() => introScreen.style.display = 'none', 800);
        
        audio.currentTime = 0;
        audio.play();

        catsCouple.classList.add('dance-pulse');
        
        // Ráfaga inicial continua desde diferentes lados
        dynamicHeartsInterval = setInterval(() => spawnCSSHeart(false), 250);

        audio.addEventListener('timeupdate', handleSync);
    }

    function handleSync() {
        let current = audio.currentTime;
        let state = timeline.reduce((acc, curr) => current >= curr.time ? curr : acc, timeline[0]);
        
        if (lyricsText.innerText !== state.text) {
            lyricsText.innerText = state.text;
            applyBehavior(state.action);
        }
    }

    function applyBehavior(action) {
        catL.className = "cat cat-left";
        catR.className = "cat cat-right";

        if (action === "normal") {
            catsCouple.style.gap = "160px";
        }
        else if (action === "L-funny") {
            catL.classList.add("funny-tongue");
            catR.classList.add("laughing");
        } 
        else if (action === "R-funny") {
            catR.classList.add("funny-tongue");
            catL.classList.add("laughing");
        } 
        else if (action === "pre-love") {
            catsCouple.style.gap = "100px"; 
            catL.classList.add("in-love");
            catR.classList.add("in-love");
        } 
        else if (action === "give-flower") {
            catsCouple.style.gap = "50px"; 
            catL.classList.add("reveal-flower", "in-love"); 
            catR.classList.add("surprised");               
        }
        else if (action === "together-laugh") {
            catsCouple.style.gap = "12px"; // Totalmente pegados
            catL.classList.add("reveal-flower", "laughing");
            catR.classList.add("laughing"); 
            
            // Cambiar ráfaga: detener ráfaga rápida e iniciar una calmada cada 2 segundos
            clearInterval(dynamicHeartsInterval);
            if (!finalHeartsInterval) {
                finalHeartsInterval = setInterval(() => spawnCSSHeart(true), 2000); // 1 corazón cada 2 segundos al final
            }
        }
        else if (action === "end") {
            catsCouple.style.gap = "12px";
            catL.classList.add("reveal-flower", "laughing");
            catR.classList.add("laughing");
            returnBtn.classList.add('show-btn'); // Revelar el botón de regreso
        }
    }
</script>

</body>
</html>
